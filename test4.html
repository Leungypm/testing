<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>速率挑戰</title>
    <style>
        body { font-family: sans-serif; background: #1a150f; color: white; text-align: center; padding: 50px; }
        .game-box { background: #2e261e; padding: 40px; border-radius: 20px; display: inline-block; border: 2px solid #f59e0b; }
        button { padding: 10px 20px; background: #f59e0b; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="game-box">
        <h2>🏎️ 極速賽車速率賽</h2>
        <p>賽車跑了 200 米，用了 10 秒。</p>
        <h3>平均速率是多少 m/s？</h3>
        <input type="number" id="ans" style="padding:10px; font-size:20px;">
        <button onclick="check()">衝過終點</button>
        <p id="msg"></p>
        <a href="index.html" style="color: #888; text-decoration: none; display: block; margin-top: 20px;">返回大廳</a>
    </div>
    <script>
        function check() {
            const val = document.getElementById('ans').value;
            const msg = document.getElementById('msg');
            if(val == 20) {
                msg.innerText = "✅ 太快了！速率是 20 m/s"; msg.style.color = "#f59e0b";
            } else {
                msg.innerText = "❌ 速率 = 距離 / 時間"; msg.style.color = "#e74c3c";
            }
        }
    </script>
</body>
</html>
